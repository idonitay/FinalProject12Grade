<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="260" viewBox="0 0 1040 260" role="img" aria-labelledby="title desc">
  <title id="title">Server game ended message fields</title>
  <desc id="desc">Field names and types for Server game ended message fields.</desc>
  <defs>
    <style>
      .background { fill: #ffffff; }
      .outer { fill: #ffffff; stroke: #c9d1dd; stroke-width: 1.5; }
      .head { fill: #f1f5f9; }
      .line { stroke: #d7dde7; stroke-width: 1; }
      .head-text { fill: #334155; font: 700 13px Arial, sans-serif; }
      .name { fill: #111827; font: 700 15px Arial, sans-serif; }
      .type { fill: #1f2937; font: 14px Arial, sans-serif; }
      .note { fill: #4b5563; font: 14px Arial, sans-serif; }
    </style>
  </defs>

  <rect class="background" x="0" y="0" width="1040" height="260"/>
  <rect class="outer" x="24" y="24" width="992" height="212" rx="8"/>

  <rect class="head" x="24" y="24" width="992" height="44" rx="8"/>
  <line class="line" x1="24" y1="68" x2="1016" y2="68"/>

  <text class="head-text" x="48" y="52">Name</text>
  <text class="head-text" x="288" y="52">Type</text>
  <text class="head-text" x="440" y="52">Required</text>
  <text class="head-text" x="568" y="52">Value / Meaning</text>

  <line class="line" x1="264" y1="24" x2="264" y2="236"/>
  <line class="line" x1="416" y1="24" x2="416" y2="236"/>
  <line class="line" x1="544" y1="24" x2="544" y2="236"/>

  <text class="name" x="48" y="102">opcode</text>
  <text class="type" x="288" y="102">number</text>
  <text class="type" x="440" y="102">yes</text>
  <text class="note" x="568" y="102">server_2_client["Game ended"] (14)</text>
  <line class="line" x1="24" y1="124" x2="1016" y2="124"/>

  <text class="name" x="48" y="158">message</text>
  <text class="type" x="288" y="158">string</text>
  <text class="type" x="440" y="158">yes</text>
  <text class="note" x="568" y="158">winner announcement</text>
  <line class="line" x1="24" y1="180" x2="1016" y2="180"/>

  <text class="name" x="48" y="214">src</text>
  <text class="type" x="288" y="214">string</text>
  <text class="type" x="440" y="214">yes</text>
  <text class="note" x="568" y="214">"server"</text>

</svg>
