<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="621" viewBox="0 0 1200 621" role="img" aria-labelledby="title desc">
  <title id="title">Ready and first-player sequence</title>
  <desc id="desc">The post-handshake Ready message and the optional first-player response.</desc>
  <defs>
    <marker id="arrow-plain" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="arrow-head-plain"/>
    </marker>
    <marker id="arrow-secure" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="arrow-head-secure"/>
    </marker>
    <style>
      .background { fill: #ffffff; }
      .title { fill: #111827; font: 700 24px Arial, sans-serif; }
      .subtitle { fill: #4b5563; font: 14px Arial, sans-serif; }
      .participant { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.5; }
      .participant-text { fill: #111827; font: 700 15px Arial, sans-serif; }
      .lifeline { stroke: #cbd5e1; stroke-width: 1.5; stroke-dasharray: 6 8; }
      .arrow-plain { stroke: #2563eb; stroke-width: 2; }
      .arrow-secure { stroke: #059669; stroke-width: 2.25; }
      .arrow-head-plain { fill: #2563eb; }
      .arrow-head-secure { fill: #059669; }
      .step-box { fill: #f8fafc; stroke: #d1d5db; stroke-width: 1.25; }
      .note-box { fill: #fff7ed; stroke: #fed7aa; stroke-width: 1.25; }
      .group-box { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.25; stroke-dasharray: 8 6; }
      .group-title-bg { fill: #e2e8f0; }
      .label { fill: #111827; font: 700 14px Arial, sans-serif; }
      .secure-label { fill: #047857; }
      .detail { fill: #4b5563; font: 13px Arial, sans-serif; }
      .note-text { fill: #7c2d12; font: 13px Arial, sans-serif; }
      .group-title { fill: #334155; font: 700 13px Arial, sans-serif; }
    </style>
  </defs>

  <rect class="background" x="0" y="0" width="1200" height="621"/>
  <text class="title" x="600" y="36" text-anchor="middle">Ready and first-player sequence</text>
  <text class="subtitle" x="600" y="60" text-anchor="middle">The post-handshake Ready message and the optional first-player response.</text>

  <rect class="participant" x="150" y="78" width="220" height="44" rx="8"/>
  <text class="participant-text" x="260" y="106" text-anchor="middle">Browser client</text>
  <line class="lifeline" x1="260" y1="86" x2="260" y2="593"/>
  <rect class="participant" x="830" y="78" width="220" height="44" rx="8"/>
  <text class="participant-text" x="940" y="106" text-anchor="middle">WebSocket server</text>
  <line class="lifeline" x1="940" y1="86" x2="940" y2="593"/>
  <text class="label secure-label" x="600" y="150" text-anchor="middle">Encrypted Ready message</text>
  <text class="detail" x="600" y="173" text-anchor="middle">Opcode 11, empty message, dst "server"; sent after the client saves</text>
  <text class="detail" x="600" y="190" text-anchor="middle">session keys.</text>
  <line class="arrow-secure" x1="282" y1="225" x2="912" y2="225" marker-end="url(#arrow-secure)"/>
  <rect class="step-box" x="765" y="242" width="350" height="84" rx="8"/>
  <text class="label" x="940" y="261" text-anchor="middle">Verify, decrypt, and handle Ready</text>
  <text class="detail" x="940" y="287" text-anchor="middle">The server only sends a response when</text>
  <text class="detail" x="940" y="302" text-anchor="middle">there is exactly one connected wrapper.</text>
  <rect class="group-box" x="104" y="346" width="992" height="239" rx="10"/>
  <rect class="group-title-bg" x="104" y="346" width="992" height="34" rx="10"/>
  <text class="group-title" x="126" y="368" text-anchor="start">If this is the only connected client</text>
  <text class="label secure-label" x="600" y="406" text-anchor="middle">Encrypted First player message</text>
  <text class="detail" x="600" y="429" text-anchor="middle">Opcode 15 is sent through send_message_to_player_wrapper.</text>
  <line class="arrow-secure" x1="918" y1="464" x2="288" y2="464" marker-end="url(#arrow-secure)"/>
  <rect class="step-box" x="85" y="481" width="350" height="84" rx="8"/>
  <text class="label" x="260" y="500" text-anchor="middle">Create start-game button</text>
  <text class="detail" x="260" y="526" text-anchor="middle">The client handles opcode 15 by calling</text>
  <text class="detail" x="260" y="541" text-anchor="middle">create_start_game_button.</text>
</svg>
