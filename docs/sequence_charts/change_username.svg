<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540" role="img" aria-labelledby="title desc">
  <title id="title">Change username sequence</title>
  <desc id="desc">A player changes the username stored on the server wrapper.</desc>
  <defs>
    <marker id="arrow-plain" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="arrow-head-plain"/>
    </marker>
    <marker id="arrow-secure" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="arrow-head-secure"/>
    </marker>
    <style>
      .background { fill: #ffffff; }
      .title { fill: #111827; font: 700 24px Arial, sans-serif; }
      .subtitle { fill: #4b5563; font: 14px Arial, sans-serif; }
      .participant { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.5; }
      .participant-text { fill: #111827; font: 700 15px Arial, sans-serif; }
      .lifeline { stroke: #cbd5e1; stroke-width: 1.5; stroke-dasharray: 6 8; }
      .arrow-plain { stroke: #2563eb; stroke-width: 2; }
      .arrow-secure { stroke: #059669; stroke-width: 2.25; }
      .arrow-head-plain { fill: #2563eb; }
      .arrow-head-secure { fill: #059669; }
      .step-box { fill: #f8fafc; stroke: #d1d5db; stroke-width: 1.25; }
      .note-box { fill: #fff7ed; stroke: #fed7aa; stroke-width: 1.25; }
      .group-box { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.25; stroke-dasharray: 8 6; }
      .group-title-bg { fill: #e2e8f0; }
      .label { fill: #111827; font: 700 14px Arial, sans-serif; }
      .secure-label { fill: #047857; }
      .detail { fill: #4b5563; font: 13px Arial, sans-serif; }
      .note-text { fill: #7c2d12; font: 13px Arial, sans-serif; }
      .group-title { fill: #334155; font: 700 13px Arial, sans-serif; }
    </style>
  </defs>

  <rect class="background" x="0" y="0" width="1200" height="540"/>
  <text class="title" x="600" y="36" text-anchor="middle">Change username sequence</text>
  <text class="subtitle" x="600" y="60" text-anchor="middle">A player changes the username stored on the server wrapper.</text>

  <rect class="participant" x="150" y="78" width="220" height="44" rx="8"/>
  <text class="participant-text" x="260" y="106" text-anchor="middle">Browser client</text>
  <line class="lifeline" x1="260" y1="86" x2="260" y2="512"/>
  <rect class="participant" x="830" y="78" width="220" height="44" rx="8"/>
  <text class="participant-text" x="940" y="106" text-anchor="middle">WebSocket server</text>
  <line class="lifeline" x1="940" y1="86" x2="940" y2="512"/>
  <rect class="step-box" x="85" y="132" width="350" height="84" rx="8"/>
  <text class="label" x="260" y="151" text-anchor="middle">Type username and press Enter</text>
  <text class="detail" x="260" y="177" text-anchor="middle">The browser updates the local username</text>
  <text class="detail" x="260" y="192" text-anchor="middle">variable immediately.</text>
  <text class="label secure-label" x="600" y="244" text-anchor="middle">Encrypted Change username message</text>
  <text class="detail" x="600" y="267" text-anchor="middle">Opcode 10, message is the new username, dst "server".</text>
  <line class="arrow-secure" x1="282" y1="302" x2="912" y2="302" marker-end="url(#arrow-secure)"/>
  <rect class="step-box" x="765" y="319" width="350" height="99" rx="8"/>
  <text class="label" x="940" y="338" text-anchor="middle">Update wrapper username</text>
  <text class="detail" x="940" y="364" text-anchor="middle">handle_user_message stores message as</text>
  <text class="detail" x="940" y="379" text-anchor="middle">source_wrapper.username and returns no</text>
  <text class="detail" x="940" y="394" text-anchor="middle">response.</text>
  <rect class="note-box" x="80" y="428" width="360" height="60" rx="8"/>
  <text class="note-text" x="260" y="451" text-anchor="middle">No server confirmation is sent; future</text>
  <text class="note-text" x="260" y="467" text-anchor="middle">messages use the new username.</text>
</svg>
