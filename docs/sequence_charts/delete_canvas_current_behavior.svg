<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Delete canvas sequence</title>
  <desc id="desc">Current runtime behavior for the Delete canvas client message.</desc>
  <defs>
    <marker id="arrow-plain" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="arrow-head-plain"/>
    </marker>
    <marker id="arrow-secure" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="arrow-head-secure"/>
    </marker>
    <style>
      .background { fill: #ffffff; }
      .title { fill: #111827; font: 700 24px Arial, sans-serif; }
      .subtitle { fill: #4b5563; font: 14px Arial, sans-serif; }
      .participant { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.5; }
      .participant-text { fill: #111827; font: 700 15px Arial, sans-serif; }
      .lifeline { stroke: #cbd5e1; stroke-width: 1.5; stroke-dasharray: 6 8; }
      .arrow-plain { stroke: #2563eb; stroke-width: 2; }
      .arrow-secure { stroke: #059669; stroke-width: 2.25; }
      .arrow-head-plain { fill: #2563eb; }
      .arrow-head-secure { fill: #059669; }
      .step-box { fill: #f8fafc; stroke: #d1d5db; stroke-width: 1.25; }
      .note-box { fill: #fff7ed; stroke: #fed7aa; stroke-width: 1.25; }
      .group-box { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.25; stroke-dasharray: 8 6; }
      .group-title-bg { fill: #e2e8f0; }
      .label { fill: #111827; font: 700 14px Arial, sans-serif; }
      .secure-label { fill: #047857; }
      .detail { fill: #4b5563; font: 13px Arial, sans-serif; }
      .note-text { fill: #7c2d12; font: 13px Arial, sans-serif; }
      .group-title { fill: #334155; font: 700 13px Arial, sans-serif; }
    </style>
  </defs>

  <rect class="background" x="0" y="0" width="1200" height="675"/>
  <text class="title" x="600" y="36" text-anchor="middle">Delete canvas sequence</text>
  <text class="subtitle" x="600" y="60" text-anchor="middle">Current runtime behavior for the Delete canvas client message.</text>

  <rect class="participant" x="70" y="78" width="220" height="44" rx="8"/>
  <text class="participant-text" x="180" y="106" text-anchor="middle">Sender client</text>
  <line class="lifeline" x1="180" y1="86" x2="180" y2="647"/>
  <rect class="participant" x="490" y="78" width="220" height="44" rx="8"/>
  <text class="participant-text" x="600" y="106" text-anchor="middle">WebSocket server</text>
  <line class="lifeline" x1="600" y1="86" x2="600" y2="647"/>
  <rect class="participant" x="910" y="78" width="220" height="44" rx="8"/>
  <text class="participant-text" x="1020" y="106" text-anchor="middle">All connected clients</text>
  <line class="lifeline" x1="1020" y1="86" x2="1020" y2="647"/>
  <rect class="step-box" x="5" y="132" width="350" height="84" rx="8"/>
  <text class="label" x="180" y="151" text-anchor="middle">Clear local canvas</text>
  <text class="detail" x="180" y="177" text-anchor="middle">The trash button clears the sender</text>
  <text class="detail" x="180" y="192" text-anchor="middle">immediately before sending the message.</text>
  <text class="label secure-label" x="390" y="244" text-anchor="middle">Encrypted Delete canvas packet</text>
  <text class="detail" x="390" y="267" text-anchor="middle">Opcode 6, empty message, dst broadcast.</text>
  <line class="arrow-secure" x1="202" y1="302" x2="572" y2="302" marker-end="url(#arrow-secure)"/>
  <rect class="step-box" x="425" y="319" width="350" height="99" rx="8"/>
  <text class="label" x="600" y="338" text-anchor="middle">No Delete canvas handler</text>
  <text class="detail" x="600" y="364" text-anchor="middle">handle_user_message has no branch for</text>
  <text class="detail" x="600" y="379" text-anchor="middle">client opcode 6, so it returns an unknown</text>
  <text class="detail" x="600" y="394" text-anchor="middle">response.</text>
  <text class="label secure-label" x="810" y="446" text-anchor="middle">Encrypted unknown broadcast</text>
  <text class="detail" x="810" y="469" text-anchor="middle">Because the request dst was broadcast, the unknown response is broadcast</text>
  <text class="detail" x="810" y="486" text-anchor="middle">to connected clients.</text>
  <line class="arrow-secure" x1="622" y1="521" x2="992" y2="521" marker-end="url(#arrow-secure)"/>
  <rect class="step-box" x="845" y="538" width="350" height="99" rx="8"/>
  <text class="label" x="1020" y="557" text-anchor="middle">Log unidentified message</text>
  <text class="detail" x="1020" y="583" text-anchor="middle">The client switch has no case for opcode</text>
  <text class="detail" x="1020" y="598" text-anchor="middle">unknown, so other clients do not clear</text>
  <text class="detail" x="1020" y="613" text-anchor="middle">from this packet.</text>
</svg>
